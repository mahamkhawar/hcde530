<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Responses Dashboard</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.45;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.7rem;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin-bottom: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
    }

    .kpi-label {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 6px;
    }

    .kpi-value {
      font-size: 1.6rem;
      font-weight: 700;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 1.05rem;
    }

    .bars {
      display: grid;
      gap: 9px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 130px 1fr 46px;
      gap: 10px;
      align-items: center;
      font-size: 0.92rem;
    }

    .bar-track {
      height: 18px;
      background: #eef2ff;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #dbe3ff;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #60a5fa, var(--accent));
    }

    .filter-row {
      margin: 16px 0 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input, select {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 0.95rem;
      background: #fff;
    }

    input {
      min-width: 260px;
      flex: 1 1 280px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      font-size: 0.92rem;
    }

    th {
      background: #f9fafb;
      font-weight: 600;
    }

    tbody tr:hover {
      background: #f8fbff;
    }

    .muted {
      color: var(--muted);
      font-size: 0.86rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Demo Responses Dashboard</h1>
    <div class="subtitle">Snapshot of `demo_responses.csv` with response-length and role insights.</div>

    <div class="grid" id="kpiGrid"></div>

    <div class="grid" style="grid-template-columns: 1fr 1fr;">
      <section class="card">
        <h2 class="section-title">Responses by Role</h2>
        <div class="bars" id="roleBars"></div>
      </section>
      <section class="card">
        <h2 class="section-title">Longest Responses (Top 8)</h2>
        <div class="bars" id="lengthBars"></div>
      </section>
    </div>

    <div class="filter-row">
      <input id="searchInput" placeholder="Search response text..." />
      <select id="roleFilter"></select>
    </div>
    <div class="muted" id="resultCount"></div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Role</th>
          <th>Word Count</th>
          <th>Response</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
    const csvData = `participant_id,role,response
P01,UX Researcher,"I usually start by reviewing whatever documentation exists, but honestly most of the time there isn't much. I end up doing a lot of stakeholder interviews just to figure out what the product is actually supposed to do."
P02,UX Designer,"The hardest part is getting engineers to understand why we need more than two weeks for discovery. They always want to jump straight to wireframes. I've started framing research as risk reduction and that helps a little."
P03,Product Manager,"We run two-week sprints and research keeps getting squeezed into the first three days. By the time we have findings, the design decisions are already made. I don't know how to fix that."
P04,UX Researcher,"Recruiting is always the bottleneck. We spend more time finding participants than actually running sessions. I wish we had a panel we could pull from instead of starting from scratch every time."
P05,Content Strategist,"Nobody invites me into the research phase. I find out what users said in the readout and by then the IA is already locked. The language problems surface in usability testing three months later."
P06,UX Designer,"I've started doing five-minute hallway tests with anyone I can find. It's not rigorous but it's faster than waiting for a formal study to get scheduled and approved."
P07,UX Researcher,"The synthesis step is where we lose people. Everyone attends the sessions but nobody wants to sit through two days of affinity mapping. I've tried doing it async with Miro but participation drops off."
P08,Product Manager,"My biggest frustration is that research findings don't translate into decisions. We get a deck with quotes and themes and then everyone nods and goes back to doing what they planned to do anyway."
P09,UX Designer,"I find it really hard to push back when someone senior says they already know what users want. Even when I have data that contradicts them."
P10,UX Researcher,"Remote sessions have actually improved our geographic diversity. We used to only talk to people in Seattle. Now we regularly include participants from smaller cities and that's changed some of our assumptions."
P11,Content Strategist,"I've been trying to introduce plain language principles but the legal team always pushes back. They want specific wording that users consistently misread in testing. It's a constant negotiation."
P12,Product Manager,"We don't have a dedicated researcher on my team so I end up doing interviews myself. I'm not sure I'm doing them well but it's better than not doing them at all."
P13,UX Designer,"The gap between what users say they do and what they actually do is real. I had a participant tell me they always read the confirmation email and then in the diary study we ran they never opened a single one."
P14,UX Researcher,"I'm spending more time writing reports that nobody reads than actually doing research. I've been experimenting with shorter formats, like a one-page brief, and that gets more engagement."
P15,Product Manager,"Our design system has made things more consistent but it's also made some teams less willing to question patterns that don't actually work for their users. Convention becomes a crutch."
P16,UX Designer,"I've started including a confidence rating in my recommendations, like this is high confidence from multiple sources versus this is directional from a single session. It's changed how people receive the findings."
P17,UX Researcher,"Accessibility keeps getting treated as a compliance checklist instead of a design constraint. I've had the most success when I can get an assistive technology user into a session early because seeing it is harder to argue with than reading about it."
P18,Content Strategist,"Error messages are the last thing anyone thinks about and the first thing users notice when something goes wrong. I've been trying to get them into scope earlier but they always end up being a handoff item."
P19,UX Designer,"I struggle with knowing when I have enough data. There's always pressure to do one more round but at some point you're validating what you already know."
P20,Product Manager,"The most useful thing research has done for us is help us stop building things. We killed two features last quarter based on findings and that felt like a win even though it's hard to show in a metric."
P21,UX Researcher,"We've been using AI to help with transcript analysis and it speeds things up but I always do a pass myself because it flattens nuance. It's good at finding patterns and bad at knowing which ones matter."
P22,UX Designer,"Onboarding is where our product falls apart and everyone knows it but there's no owner. Product thinks it's design, design thinks it's content, content thinks it's engineering. The user just bounces."
P23,Content Strategist,"I've been pushing for a terminology audit across the product for two years. Different parts of the app use different words for the same thing and users notice even if they can't articulate why."
P24,UX Researcher,"The best sessions I run are the ones where I say almost nothing. The worst are when I'm trying to cover too many topics and I end up steering instead of listening."
P25,Product Manager,"We did a diary study last year and the data was incredible but we've never had the budget or time to do another one. I think longitudinal research is undersold in product teams."`;

    function parseCSV(text) {
      const lines = text.trim().split("\n");
      lines.shift();
      return lines.map((line) => {
        const firstComma = line.indexOf(",");
        const secondComma = line.indexOf(",", firstComma + 1);
        const participant_id = line.slice(0, firstComma);
        const role = line.slice(firstComma + 1, secondComma);
        let response = line.slice(secondComma + 1).trim();
        if (response.startsWith('"') && response.endsWith('"')) {
          response = response.slice(1, -1);
        }
        return { participant_id, role, response };
      });
    }

    function wordCount(text) {
      return text.trim().split(/\s+/).filter(Boolean).length;
    }

    const data = parseCSV(csvData).map((row) => ({
      ...row,
      words: wordCount(row.response),
    }));

    const roleCounts = data.reduce((acc, row) => {
      acc[row.role] = (acc[row.role] || 0) + 1;
      return acc;
    }, {});

    const words = data.map((d) => d.words);
    const avg = words.reduce((a, b) => a + b, 0) / words.length;
    const min = Math.min(...words);
    const max = Math.max(...words);

    function renderKpis() {
      const kpis = [
        { label: "Total Responses", value: data.length },
        { label: "Average Words", value: avg.toFixed(1) },
        { label: "Shortest Response", value: min },
        { label: "Longest Response", value: max },
      ];
      const grid = document.getElementById("kpiGrid");
      grid.innerHTML = kpis
        .map(
          (k) => `
          <div class="card">
            <div class="kpi-label">${k.label}</div>
            <div class="kpi-value">${k.value}</div>
          </div>`
        )
        .join("");
    }

    function renderRoleBars() {
      const maxCount = Math.max(...Object.values(roleCounts));
      const roleBars = document.getElementById("roleBars");
      roleBars.innerHTML = Object.entries(roleCounts)
        .sort((a, b) => b[1] - a[1])
        .map(([role, count]) => {
          const pct = (count / maxCount) * 100;
          return `
            <div class="bar-row">
              <div>${role}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${pct}%;"></div></div>
              <div>${count}</div>
            </div>
          `;
        })
        .join("");
    }

    function renderLengthBars() {
      const top = [...data].sort((a, b) => b.words - a.words).slice(0, 8);
      const localMax = Math.max(...top.map((t) => t.words));
      const lengthBars = document.getElementById("lengthBars");
      lengthBars.innerHTML = top
        .map((row) => {
          const pct = (row.words / localMax) * 100;
          return `
            <div class="bar-row">
              <div>${row.participant_id}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${pct}%;"></div></div>
              <div>${row.words}</div>
            </div>
          `;
        })
        .join("");
    }

    function renderRoleFilter() {
      const roleFilter = document.getElementById("roleFilter");
      const roles = [...new Set(data.map((d) => d.role))].sort();
      roleFilter.innerHTML = [
        `<option value="">All roles</option>`,
        ...roles.map((role) => `<option value="${role}">${role}</option>`),
      ].join("");
    }

    function renderTable(rows) {
      const body = document.getElementById("tableBody");
      const count = document.getElementById("resultCount");
      count.textContent = `${rows.length} of ${data.length} responses shown`;
      body.innerHTML = rows
        .map(
          (r) => `
          <tr>
            <td>${r.participant_id}</td>
            <td>${r.role}</td>
            <td>${r.words}</td>
            <td>${r.response}</td>
          </tr>
        `
        )
        .join("");
    }

    function applyFilters() {
      const term = document.getElementById("searchInput").value.toLowerCase().trim();
      const role = document.getElementById("roleFilter").value;
      const filtered = data.filter((r) => {
        const roleMatch = role ? r.role === role : true;
        const textMatch = term ? r.response.toLowerCase().includes(term) : true;
        return roleMatch && textMatch;
      });
      renderTable(filtered);
    }

    renderKpis();
    renderRoleBars();
    renderLengthBars();
    renderRoleFilter();
    renderTable(data);

    document.getElementById("searchInput").addEventListener("input", applyFilters);
    document.getElementById("roleFilter").addEventListener("change", applyFilters);
  </script>
</body>
</html>
